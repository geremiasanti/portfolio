<!DOCTYPE html>
{% with color_bg="#16191b" color_text_0="#fff"  color_text_1="#606060"%}
<html lang="en">
<head>
    <title>Geremia Santi</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap');
    html, body {
        height: 100%;
    }
    body {
        font-family: 'Roboto Mono', monospace;
        background-color: {{ color_bg }};
        color: {{ color_text_0 }};
    } 
    hr {
        background-color: {{ color_text_1 }};
    }
    .secondary_text_color {
        color: {{ color_text_1 }} !important;
    }
    a {
        line-height: 1;
        /*background: linear-gradient(to right, rgba(155, 0, 0, 1), rgba(255, 0, 180, 1), rgba(0, 100, 200, 1)) no-repeat right bottom / 0 var(--bg-h);*/
        background: linear-gradient(to right, #8A2387, #E94057, #F27121) no-repeat right bottom / 0 var(--bg-h);
        transition: background-size 350ms;
        --bg-h: 100%;
    }
    a:where(:hover, :focus-visible) {
        background-size: 100% var(--bg-h);
        background-position-x: left;
    }
    .hover-underline-only {
        padding-bottom: 2px;
        --bg-h: 2px;
    }
    a:link, a:visited,  a:hover, a:active {
        color: inherit;
        text-decoration: none;
    }
    {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <script>
        {% block extra_script %}{% endblock %}
    </script>
    {% block page %}{% endblock %}
</body>
</html>
{% endwith %}
